models:
  - name: int_qmul_gp_bp_registry_base_population
    description: 'Base population for the QMUL GP BP Registry research cohort.

      Persons on the QOF hypertension register (adult, active HTN diagnosis) with at least one oral antihypertensive medication order on record.
      Downstream models apply BP reading count and spacing rules, and exclude BP readings taken during pregnancy/HDP windows.'
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - person_id
    columns:
      - name: person_id
        description: 'Unique identifier for the person'
        tests:
          - not_null
          - unique
      - name: age
        description: 'Current age in years'
        tests:
          - not_null
      - name: earliest_diagnosis_date
        description: 'Earliest active hypertension diagnosis date'
      - name: latest_diagnosis_date
        description: 'Most recent hypertension diagnosis date (post-resolution if any)'
      - name: earliest_antihyp_order_date
        description: 'Earliest oral antihypertensive medication order date'
      - name: latest_antihyp_order_date
        description: 'Most recent oral antihypertensive medication order date'
